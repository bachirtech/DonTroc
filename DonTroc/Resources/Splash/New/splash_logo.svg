<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Logo DonTroc simplifié - vectoriel pur -->
  <!-- Fond transparent : MAUI gère le fond via Color="#F6F1EB" -->
  
  <!-- Cercle de fond du logo -->
  <circle cx="256" cy="256" r="220" fill="#8B4513" opacity="0.1"/>
  
  <!-- Flèches de troc/échange -->
  <g transform="translate(256,256)">
    <!-- Flèche gauche vers droite -->
    <path d="M-120,0 L80,0 M50,-30 L80,0 L50,30" 
          stroke="#8B4513" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"
          transform="translate(0,-50)"/>
    <!-- Flèche droite vers gauche -->
    <path d="M120,0 L-80,0 M-50,-30 L-80,0 L-50,30" 
          stroke="#6B8E23" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"
          transform="translate(0,50)"/>
  </g>
  
  <!-- Coeur de don au centre -->
  <path d="M256,300 C256,300 180,240 180,200 C180,170 200,155 225,155 C245,155 256,170 256,170 C256,170 267,155 287,155 C312,155 332,170 332,200 C332,240 256,300 256,300Z" 
        fill="#D2691E" opacity="0.8"/>
  
  <!-- Texte DonTroc -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" 
        font-size="72" font-weight="bold" fill="#8B4513">DonTroc</text>
</svg>

