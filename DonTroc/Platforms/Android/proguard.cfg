# Configuration ProGuard/R8 pour DonTroc
# Résolution des conflits de classes dupliquées entre Firebase et AdMob

# Garder toutes les classes Google Play Services
-keep class com.google.android.gms.** { *; }
-dontwarn com.google.android.gms.**

# Garder toutes les classes Firebase
-keep class com.google.firebase.** { *; }
-dontwarn com.google.firebase.**

# Ignorer les avertissements de duplication pour les classes internes measurement
-dontnote com.google.android.gms.internal.measurement.**

# Garder les classes AdMob
-keep class com.google.android.gms.ads.** { *; }
-dontwarn com.google.android.gms.ads.**

# Configuration pour éviter les problèmes avec les classes dupliquées
-ignorewarnings

