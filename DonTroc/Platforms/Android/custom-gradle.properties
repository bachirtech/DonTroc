# Configuration Gradle personnalisée pour résoudre les conflits de classes dupliquées
# Entre Firebase Analytics et Google Play Services Ads

# Forcer D8 à ignorer les classes dupliquées
android.enableD8.desugaring=false
android.enableR8.fullMode=false

# Accepter les duplications de classes
android.uniquePackageNames=false

# Désactiver les vérifications strictes
android.enableDexingArtifactTransform=false

